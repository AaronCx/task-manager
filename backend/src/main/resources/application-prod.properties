# ── Production profile (Render) ──────────────────────────────────────────────
# Activated via: SPRING_PROFILES_ACTIVE=prod

# Hibernate: validate schema only — never auto-modify in production
spring.jpa.hibernate.ddl-auto=update

# Kafka disabled in production (Render free tier); uses FallbackEventProducer
app.kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Connection pool tuning for Render free-tier PostgreSQL (max 97 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Logging
logging.level.com.portfolio.taskmanager=INFO
logging.level.org.apache.kafka=OFF
